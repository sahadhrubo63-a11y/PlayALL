<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayAll - Live TV Streaming</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --primary-color: #E50914; 
            --bg-color: #0b0b0b;
            --card-bg: #181818;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: rgba(0, 0, 0, 0.85);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--text-color);
        }

        .logo span {
            color: var(--primary-color);
        }

        .tagline {
            font-size: 14px;
            color: #aaa;
            font-style: italic;
        }

        .main-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .player-wrapper {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #222;
        }

        .category-section {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .category-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 15px;
            border-left: 5px solid var(--primary-color);
            padding-left: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 25px;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .channel-card {
            background: linear-gradient(135deg, #222, #1a1a1a);
            border: 1px solid #333;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 55px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .channel-card:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.4);
        }

        .resolution-tag {
            font-size: 10px;
            background: rgba(255, 255, 255, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 5px;
            font-weight: normal;
            color: #ccc;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 14px;
            border-top: 1px solid #222;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            .logo { font-size: 24px; }
            .channels-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
            .channel-card { padding: 12px 5px; font-size: 12px; min-height: 45px; }
        }
    </style>
</head>
<body>

    </header>
    
    <div class="main-container">
        <div class="player-wrapper">
            <video id="playall-player" class="video-js vjs-default-skin vjs-16-9 vjs-big-play-centered" controls preload="auto" width="100%">
                <source src="https://feeds.intoday.in/aajtak/api/aajtakhd/master.m3u8" type="application/x-mpegURL">
            </video>
        </div>

        <div class="category-section">

            <div class="category-title">🇧🇩 Bangladeshi Channels</div>
            <div class="channels-grid" id="bd-grid"></div>

            <div class="category-title">🇮🇳 Indian Bangla Channels</div>

    </div>

    <footer>
        &copy; 2026 PlayAll Streaming Network. Powered by Custom User IPTV Streams.
    </footer>

                { name: "Adhyatm TV", quality: "720p", url: "https://mumbai-edge.smartplaytv.in/AdhyatmTV/index.m3u8" }
            ]
        };

        // Function to inject channels into UI
        function createPlayAllGrid(categoryKey, targetElementId) {
            const gridContainer = document.getElementById(targetElementId);
            if (!gridContainer || !channelData[categoryKey]) return;
            
            channelData[categoryKey].forEach(channel => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                
                // Add channel name
                const nameSpan = document.createElement('span');
                nameSpan.innerText = channel.name;
                card.appendChild(nameSpan);

                // Add quality tag
                const qualitySpan = document.createElement('span');
                qualitySpan.className = 'resolution-tag';
                qualitySpan.innerText = channel.quality;
                card.appendChild(qualitySpan);
                
                // Action on click
                card.onclick = () => {
                    player.src({ type: 'application/x-mpegURL', src: channel.url });
                    player.play();
                    
                    // Smooth scroll back to player for mobile users
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                
                gridContainer.appendChild(card);
            });
        }

        // Render PlayAll Interface sections
        createPlayAllGrid('sports', 'sports-grid');
        createPlayAllGrid('bangladesh', 'bd-grid');
        createPlayAllGrid('inBangla', 'in-bangla-grid');
        createPlayAllGrid('hindi', 'hindi-grid');
        createPlayAllGrid('music', 'music-grid');
        createPlayAllGrid('devotional', 'devotional-grid');
    </script>
</body>
</html>
